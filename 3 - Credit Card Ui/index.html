<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Ui</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <header>
                    <span class="logo">
                        <img src="images/logo.png" alt="Logo">
                        <h5>Master Card</h5>
                    </span>
                    <img src="images/chip.png" class="chip" alt="Chip">  
            </header>

            <div class="card-detail">
                <div class="name-number">
                    <h6>Card Number</h6>
                    <h5 class="number">8050 2030 3020 5040</h5>
                    <h5 class="name">SHAFAAT ULLAH</h5>
                </div>

                <div class="validity">
                    <h6>Valid Thru</h6>
                    <h5>05/28</h5>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
